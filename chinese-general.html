<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Your Understanding | Reading Corner</title>
  <style>:root{--main:#9c3b34;--main-dark:#7c2d28;--terracotta:#9c3b34;--text:#2f2a26;--muted:#6c625a;--border:#eadfce;--correct:#2f7d4f;--wrong:#b0443c;--shadow:0 14px 36px rgba(60,35,20,.12);--radius:22px}*{box-sizing:border-box}body{margin:0;font-family:Arial,'Microsoft YaHei','Noto Sans SC',sans-serif;background:linear-gradient(rgba(34,24,18,.30),rgba(34,24,18,.48)),url('cover.png.png') center/cover fixed no-repeat;color:var(--text);line-height:1.75;min-height:100vh}.page-overlay{min-height:100vh;background:linear-gradient(to bottom,rgba(247,241,232,.78),rgba(247,241,232,.94));padding-bottom:36px}header{text-align:center;padding:46px 20px 28px;color:white;background:linear-gradient(135deg,rgba(124,45,40,.92),rgba(156,59,52,.90));box-shadow:0 6px 22px rgba(0,0,0,.14)}header h1{margin:0;font-size:42px;letter-spacing:1px}header p{font-size:18px;max-width:840px;margin:12px auto 0}.topline{text-transform:uppercase;letter-spacing:1.4px;font-size:14px;opacity:.92;margin-bottom:8px}main{max-width:980px;margin:34px auto;padding:0 18px}.quiz-shell{background:rgba(255,255,255,.96);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.start-screen,.question-screen,.end-screen{padding:34px}.badge{display:inline-block;background:#fff2df;color:var(--main-dark);border:1px solid #ead4b8;border-radius:999px;padding:7px 13px;font-weight:bold;font-size:13px;margin-bottom:16px}h2{margin:0 0 16px;color:var(--main-dark);font-size:31px;line-height:1.3}.lead{color:var(--muted);font-size:18px;margin-bottom:24px}.special-note{background:#f8fbf4;border:1px solid #ead4b8;border-left:6px solid var(--main);border-radius:16px;padding:18px;color:#45523a;margin:22px 0}.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:26px 0}.info-card{background:#fffaf4;border:1px solid var(--border);border-radius:16px;padding:16px;text-align:center}.info-card strong{display:block;color:var(--main-dark);font-size:18px}.progress-area{padding:24px 34px 0}.progress-top{display:flex;justify-content:space-between;color:var(--muted);font-weight:bold;margin-bottom:10px;font-size:14px}.progress-bar{height:12px;background:#efe4d8;border-radius:999px;overflow:hidden;border:1px solid #e3d4c3}.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--main),var(--terracotta));transition:width .25s ease}.question-text{font-size:24px;line-height:1.45;margin:10px 0 24px}.answers{display:grid;gap:12px;margin-bottom:22px}.answer-btn{width:100%;text-align:left;background:#fffdf9;border:1px solid var(--border);border-radius:16px;padding:16px 18px;font-size:17px;color:var(--text);cursor:pointer;line-height:1.55}.answer-btn:hover:not(:disabled){background:#f7efe4}.answer-btn:disabled{cursor:default}.answer-btn.correct{background:#e8f5ed;border-color:var(--correct);color:#1f5d3a;font-weight:bold}.answer-btn.wrong{background:#fff0ee;border-color:var(--wrong);color:#8f302a;font-weight:bold}.feedback{display:none;margin-top:18px;background:#fff8ec;border-left:6px solid var(--main);border-radius:14px;padding:18px}.feedback h3{margin:0 0 8px}.feedback p{margin:0;color:var(--muted)}.button-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px}button,.link-button{border:none;border-radius:14px;padding:14px 20px;font-size:16px;font-weight:bold;cursor:pointer;text-decoration:none;display:inline-block}.primary-action{background:var(--main);color:white}.secondary-action{background:#e8efe1;color:#3f5221;border:1px solid #d4ddca}.hidden{display:none}.score-big{font-size:54px;font-weight:bold;color:var(--main-dark);margin:12px 0}.result-box{background:#fffaf4;border:1px solid var(--border);border-radius:18px;padding:24px;margin:22px 0}.review-list{margin-top:20px;display:grid;gap:12px}.review-item{background:#fffdf9;border:1px solid var(--border);border-radius:14px;padding:14px 16px;font-size:15px}footer{text-align:center;color:var(--muted);padding:12px 20px 34px;font-size:14px}@media(max-width:720px){body{background-attachment:scroll}header h1{font-size:34px}.start-screen,.question-screen,.end-screen{padding:24px}.progress-area{padding:20px 24px 0}.question-text{font-size:21px}.info-grid{grid-template-columns:1fr}}</style>
</head>
<body>
<div class="page-overlay"><header><div class="topline">Reading Corner · 中文</div><h1>Check Your Understanding</h1><p>郁金香街的谜案 — 中文理解测验</p></header>
<main><section class="quiz-shell">
<div id="startScreen" class="start-screen"><span class="badge">中文 · 故事理解 · 20 道题</span><h2>你真的读懂故事了吗？</h2><p class="lead">这个测验不仅考最简单的事实，也考细节、事件顺序、线索、嫌疑点和人物行为中的小信号。</p><div class="info-grid"><div class="info-card"><strong>20</strong><span>道题</span></div><div class="info-card"><strong>中文</strong><span>故事版</span></div><div class="info-card"><strong>即时</strong><span>反馈</span></div></div><div class="button-row"><button class="primary-action" onclick="startQuiz()">开始测验</button><a class="link-button secondary-action" href="index.html">返回主页</a></div></div>
<div id="quizScreen" class="hidden"><div class="progress-area"><div class="progress-top"><span id="questionCounter"></span><span id="scoreCounter"></span></div><div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div></div><div class="question-screen"><div class="badge" id="categoryBadge"></div><h2 id="questionText" class="question-text"></h2><div id="answers" class="answers"></div><div id="feedback" class="feedback"><h3 id="feedbackTitle"></h3><p id="feedbackText"></p></div><div class="button-row"><button id="nextButton" class="primary-action hidden" onclick="nextQuestion()">下一题</button></div></div></div>
<div id="endScreen" class="end-screen hidden"><span class="badge">测验完成</span><h2>你的结果</h2><div id="scoreBig" class="score-big"></div><div class="result-box"><p id="finalMessage" class="lead"></p></div><div class="button-row"><button class="primary-action" onclick="restartQuiz()">再试一次</button><a class="link-button secondary-action" href="index.html">返回主页</a></div><div id="reviewList" class="review-list"></div></div>
</section></main><footer>© 2026 Reading Corner — Stories to go</footer></div>
<script>
const questions = [{"category": "星期五晚上", "question": "星期五晚上，贾科莫为什么骑自行车回家？", "answers": ["因为他刚从足球训练回来，足球训练通常在星期二和星期五。", "因为他陪西莫娜去超市买咖啡。", "因为警察让他去车库检查情况。", "因为他刚去拜访马尔蒂诺医生。"], "correct": 0, "explanation": "故事一开始就说，贾科莫每周二和周五去参加足球训练，而且骑自行车去，也骑自行车回来。"}, {"category": "西莫娜", "question": "西莫娜为什么刚刚去了超市？", "answers": ["为了买做蛋糕用的糖。", "为了买咖啡，因为她妈妈忘了买。", "为了找她弟弟费代里科。", "为了打听卡西先生的消息。"], "correct": 1, "explanation": "西莫娜说，她去前面的超市买咖啡，因为妈妈忘了买。"}, {"category": "电梯", "question": "哪个日常小细节让贾科莫和西莫娜不得不经过卡西先生家门口？", "answers": ["大楼门口锁上了。", "警察挡住了走廊。", "电梯停止使用。", "瓦莱小姐在楼梯上叫他们。"], "correct": 2, "explanation": "电梯前有“停止使用”的牌子，所以他们只能走楼梯上楼。"}, {"category": "卡西先生", "question": "贾科莫心中的卡西先生是什么样子？", "answers": ["年轻、优雅、很会社交的邻居。", "强壮、开朗、充满活力的运动型男人。", "富有、善良、大家都喜欢的人。", "又矮又瘦，脸色灰沉沉，看起来像从来没有年轻过的人。"], "correct": 3, "explanation": "贾科莫想到卡西先生时，想到的是一个又矮又瘦、脸总是灰沉沉的人。"}, {"category": "冲突", "question": "卡西先生的大声音乐为什么对情节很重要？", "answers": ["因为它造成了卡西先生和邻居之间的冲突。", "因为它说明西莫娜喜欢去夜店。", "因为它解释了贾科莫为什么踢足球。", "因为它证明卡西先生认识记者。"], "correct": 0, "explanation": "贾科莫的妈妈说邻居们都觉得很吵，管理员也已经给卡西先生写过信。"}, {"category": "自行车", "question": "晚饭后，爸爸为什么让贾科莫下楼？", "answers": ["因为贾科莫要检查卡西先生是否在家。", "因为贾科莫把自行车放在门口附近，邻居会抱怨。", "因为贾科莫要去给西莫娜打电话。", "因为贾科莫要把糖还给莫雷诺一家。"], "correct": 1, "explanation": "爸爸提醒他，如果邻居看到门口有自行车或者摩托车，他们会抱怨。"}, {"category": "开着的门", "question": "贾科莫把自行车放进车库以后，看到了什么奇怪的事情？", "answers": ["他看见莫雷诺先生下楼去花园。", "他看见瓦莱小姐从卡西先生家出来。", "他听到一扇门开了又关，然后看见卡西先生家的门开着。", "他在楼梯上发现了凶器。"], "correct": 2, "explanation": "这是故事中的第一个重要线索之一：安静的大楼、门声、卡西先生开着的门。"}, {"category": "星期六早上", "question": "为什么星期六早上贾科莫本来可以睡到十点？", "answers": ["因为他的足球比赛取消了。", "因为他的父母不在家。", "因为警察让他待在房间里。", "因为老师罢工，他不用去上学。"], "correct": 3, "explanation": "故事明确说，因为老师罢工，贾科莫不用去上学。"}, {"category": "消息", "question": "星期六早上，妈妈告诉贾科莫什么消息？", "answers": ["卡西先生死了，而且有人说他被杀了。", "西莫娜在花园里等他。", "卡西先生去海边了。", "管理员想和他说话。"], "correct": 0, "explanation": "妈妈很担心地告诉他，卡西先生死了，可能是昨天晚上或者夜里被杀的。"}, {"category": "警察", "question": "年轻警察怎样看待贾科莫说的“关门声”？", "answers": ["他马上断定凶手住在这栋楼里。", "他说那可能是别的公寓的门。", "他指责贾科莫编故事。", "他让贾科莫自己继续调查。"], "correct": 1, "explanation": "年轻警察比较谨慎：一个关门声还不能证明那就是卡西先生家的门。"}, {"category": "调查方向", "question": "警察一开始想调查哪条线索？", "answers": ["西莫娜买咖啡的超市。", "坏掉的电梯。", "卡西先生那些不太靠谱的朋友。", "门口的自行车。"], "correct": 2, "explanation": "年长的警察说，邻居们看起来安静，应该调查卡西先生的朋友圈。"}, {"category": "瓦莱小姐", "question": "瓦莱小姐怎样发现卡西先生的尸体？", "answers": ["她看到凶手从楼梯跑走。", "她在花园里找到了凶器。", "她前一天晚上和卡西先生在一起。", "她经过开着的门，大声叫卡西先生，没有回应，于是走了进去。"], "correct": 3, "explanation": "瓦莱小姐说，她一大早经过那扇开着的门，叫了卡西先生，没人回应，于是进去了。"}, {"category": "贾科莫", "question": "星期六中午，贾科莫为什么生气？", "answers": ["因为他觉得警察不相信他关于门的故事。", "因为警察想审问西莫娜。", "因为瓦莱小姐不愿接受记者采访。", "因为马尔蒂诺医生失踪了。"], "correct": 0, "explanation": "他觉得警察可能以为他只是编了一个故事来引起注意。"}, {"category": "计划", "question": "贾科莫和西莫娜准备用什么方法和邻居们聊天？", "answers": ["晚上偷偷进入卡西先生的公寓。", "用做蛋糕缺糖的借口去借糖。", "劝瓦莱小姐不要再和记者说话。", "检查超市是不是真的八点关门。"], "correct": 1, "explanation": "借糖是一个进入邻居家、和他们说话的借口。"}, {"category": "嫌疑人", "question": "贾科莫为什么把瓦莱小姐排除在嫌疑人之外？", "answers": ["因为她当晚在医院值夜班。", "因为她太安静，不认识邻居。", "因为她话太多，而且身体太弱，不太可能用钝器杀人。", "因为西莫娜看到她在海边。"], "correct": 2, "explanation": "贾科莫认为瓦莱小姐话太多，而且最多五十公斤，不像能做这种事的人。"}, {"category": "马尔蒂诺医生", "question": "贾科莫把话题引到卡西先生身上时，马尔蒂诺医生说了什么？", "answers": ["他说他非常熟悉卡西先生。", "他说他看见莫雷诺先生在花园里。", "他说卡西先生是他的病人。", "他说自己前一天晚上在医院值夜班。"], "correct": 3, "explanation": "医生说他昨天不在家，因为他正在医院值夜班，而且也告诉了警察。"}, {"category": "比安奇太太", "question": "关于比安奇太太，哪个信息可能和嫌疑有关？", "answers": ["她说自己受不了噪音，所以特意选择朝院子的公寓。", "她说自己八点在超市。", "她说卡西先生是她的亲戚。", "她说是她发现了尸体。"], "correct": 0, "explanation": "她受不了噪音，而卡西先生正是因为噪音和邻居发生冲突。"}, {"category": "莫雷诺先生", "question": "拜访莫雷诺一家以后，西莫娜最担心什么？", "answers": ["莫雷诺太太把糖装在啤酒杯里。", "公寓太乱，孩子跑来跑去。", "莫雷诺先生看起来很担心，并严肃地说“我们以后再谈”。", "他们住在四楼。"], "correct": 2, "explanation": "西莫娜马上纠正自己：不是“好奇”，而是“担心”，而且他的话把她吓到了。"}, {"category": "嫌疑名单", "question": "星期六晚上，贾科莫把谁从嫌疑名单里排除了？", "answers": ["比安奇太太，因为她的公寓很安静。", "莫雷诺夫妇，因为他们有孩子。", "维拉太太，因为大家都认识她。", "马尔蒂诺医生，因为他在医院，而且看起来很平静。"], "correct": 3, "explanation": "贾科莫说，医生在医院值夜班，也告诉了警察，所以先把他排除。"}, {"category": "花园", "question": "贾科莫在花园监视时发现了什么？", "answers": ["比安奇太太和莫雷诺先生在花园见面，并且拥抱在一起。", "瓦莱小姐把凶器藏起来。", "马尔蒂诺医生从医院回来。", "维拉太太其实没有去海边。"], "correct": 0, "explanation": "这个发现让嫌疑关系变得更复杂：两个原本分开的嫌疑人之间有秘密关系。"}];
let currentQuestion=0,score=0,answered=false,userAnswers=[];
const startScreen=document.getElementById("startScreen"),quizScreen=document.getElementById("quizScreen"),endScreen=document.getElementById("endScreen"),questionCounter=document.getElementById("questionCounter"),scoreCounter=document.getElementById("scoreCounter"),progressFill=document.getElementById("progressFill"),categoryBadge=document.getElementById("categoryBadge"),questionText=document.getElementById("questionText"),answersBox=document.getElementById("answers"),feedback=document.getElementById("feedback"),feedbackTitle=document.getElementById("feedbackTitle"),feedbackText=document.getElementById("feedbackText"),nextButton=document.getElementById("nextButton"),scoreBig=document.getElementById("scoreBig"),finalMessage=document.getElementById("finalMessage"),reviewList=document.getElementById("reviewList");
function startQuiz(){startScreen.classList.add("hidden");quizScreen.classList.remove("hidden");showQuestion();}
function showQuestion(){answered=false;const q=questions[currentQuestion];categoryBadge.textContent=q.category;questionCounter.textContent="第 "+(currentQuestion+1)+" 题 / 共 "+questions.length+" 题";scoreCounter.textContent="得分："+score;progressFill.style.width=(currentQuestion/questions.length*100)+"%";questionText.textContent=q.question;answersBox.innerHTML="";feedback.style.display="none";nextButton.classList.add("hidden");q.answers.forEach((answer,index)=>{const btn=document.createElement("button");btn.className="answer-btn";btn.textContent=answer;btn.onclick=()=>chooseAnswer(index,btn);answersBox.appendChild(btn);});}
function chooseAnswer(index,button){if(answered)return;answered=true;const q=questions[currentQuestion],allButtons=document.querySelectorAll(".answer-btn");allButtons.forEach(btn=>btn.disabled=true);const isCorrect=index===q.correct;userAnswers.push({question:q.question,chosen:q.answers[index],correct:q.answers[q.correct],isCorrect:isCorrect});if(isCorrect){score++;button.classList.add("correct");feedbackTitle.textContent="正确！";feedbackText.textContent=q.explanation;}else{button.classList.add("wrong");allButtons[q.correct].classList.add("correct");feedbackTitle.textContent="不完全对。";feedbackText.textContent="正确答案："+q.answers[q.correct]+"。"+q.explanation;}scoreCounter.textContent="得分："+score;feedback.style.display="block";nextButton.textContent=currentQuestion===questions.length-1?"查看结果":"下一题";nextButton.classList.remove("hidden");progressFill.style.width=((currentQuestion+1)/questions.length*100)+"%";}
function nextQuestion(){currentQuestion++;if(currentQuestion<questions.length)showQuestion();else showResult();}
function showResult(){quizScreen.classList.add("hidden");endScreen.classList.remove("hidden");const percentage=Math.round(score/questions.length*100);scoreBig.textContent=score+" / "+questions.length+" ("+percentage+"%)";if(percentage>=90)finalMessage.textContent="非常好。你读得很仔细，也注意到了很多小线索。";else if(percentage>=70)finalMessage.textContent="很好。你理解了主要情节和重要嫌疑点。";else if(percentage>=50)finalMessage.textContent="不错的开始。建议再读一遍故事，特别注意细节。";else finalMessage.textContent="可以再试一次。第二次阅读以后，这些问题会容易很多。";reviewList.innerHTML="";userAnswers.forEach((item,idx)=>{if(!item.isCorrect){const div=document.createElement("div");div.className="review-item";div.innerHTML="<strong>第 "+(idx+1)+" 题：</strong> "+item.question+"<br>你的答案："+item.chosen+"<br>正确答案："+item.correct;reviewList.appendChild(div);}});if(reviewList.innerHTML===""){const div=document.createElement("div");div.className="review-item";div.innerHTML="<strong>完美！</strong>所有问题都答对了。";reviewList.appendChild(div);}}
function restartQuiz(){currentQuestion=0;score=0;answered=false;userAnswers=[];endScreen.classList.add("hidden");startScreen.classList.remove("hidden");progressFill.style.width="0%";}
</script>
</body>
</html>
