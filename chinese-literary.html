<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Become a Literature Expert | Reading Corner</title>
  <style>:root{--main:#6f8f4e;--main-dark:#5f7c43;--terracotta:#9c3b34;--text:#2f2a26;--muted:#6c625a;--border:#eadfce;--correct:#2f7d4f;--wrong:#b0443c;--shadow:0 14px 36px rgba(60,35,20,.12);--radius:22px}*{box-sizing:border-box}body{margin:0;font-family:Arial,'Microsoft YaHei','Noto Sans SC',sans-serif;background:linear-gradient(rgba(34,24,18,.30),rgba(34,24,18,.48)),url('cover.png.png') center/cover fixed no-repeat;color:var(--text);line-height:1.75;min-height:100vh}.page-overlay{min-height:100vh;background:linear-gradient(to bottom,rgba(247,241,232,.78),rgba(247,241,232,.94));padding-bottom:36px}header{text-align:center;padding:46px 20px 28px;color:white;background:linear-gradient(135deg,rgba(63,82,33,.93),rgba(111,143,78,.92));box-shadow:0 6px 22px rgba(0,0,0,.14)}header h1{margin:0;font-size:42px;letter-spacing:1px}header p{font-size:18px;max-width:840px;margin:12px auto 0}.topline{text-transform:uppercase;letter-spacing:1.4px;font-size:14px;opacity:.92;margin-bottom:8px}main{max-width:980px;margin:34px auto;padding:0 18px}.quiz-shell{background:rgba(255,255,255,.96);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.start-screen,.question-screen,.end-screen{padding:34px}.badge{display:inline-block;background:#e8f0df;color:var(--main-dark);border:1px solid #d4ddca;border-radius:999px;padding:7px 13px;font-weight:bold;font-size:13px;margin-bottom:16px}h2{margin:0 0 16px;color:var(--main-dark);font-size:31px;line-height:1.3}.lead{color:var(--muted);font-size:18px;margin-bottom:24px}.special-note{background:#f8fbf4;border:1px solid #d4ddca;border-left:6px solid var(--main);border-radius:16px;padding:18px;color:#45523a;margin:22px 0}.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:26px 0}.info-card{background:#fffaf4;border:1px solid var(--border);border-radius:16px;padding:16px;text-align:center}.info-card strong{display:block;color:var(--main-dark);font-size:18px}.progress-area{padding:24px 34px 0}.progress-top{display:flex;justify-content:space-between;color:var(--muted);font-weight:bold;margin-bottom:10px;font-size:14px}.progress-bar{height:12px;background:#efe4d8;border-radius:999px;overflow:hidden;border:1px solid #e3d4c3}.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--main),var(--terracotta));transition:width .25s ease}.question-text{font-size:24px;line-height:1.45;margin:10px 0 24px}.answers{display:grid;gap:12px;margin-bottom:22px}.answer-btn{width:100%;text-align:left;background:#fffdf9;border:1px solid var(--border);border-radius:16px;padding:16px 18px;font-size:17px;color:var(--text);cursor:pointer;line-height:1.55}.answer-btn:hover:not(:disabled){background:#f7efe4}.answer-btn:disabled{cursor:default}.answer-btn.correct{background:#e8f5ed;border-color:var(--correct);color:#1f5d3a;font-weight:bold}.answer-btn.wrong{background:#fff0ee;border-color:var(--wrong);color:#8f302a;font-weight:bold}.feedback{display:none;margin-top:18px;background:#fff8ec;border-left:6px solid var(--main);border-radius:14px;padding:18px}.feedback h3{margin:0 0 8px}.feedback p{margin:0;color:var(--muted)}.button-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px}button,.link-button{border:none;border-radius:14px;padding:14px 20px;font-size:16px;font-weight:bold;cursor:pointer;text-decoration:none;display:inline-block}.primary-action{background:var(--main);color:white}.secondary-action{background:#e8efe1;color:#3f5221;border:1px solid #d4ddca}.hidden{display:none}.score-big{font-size:54px;font-weight:bold;color:var(--main-dark);margin:12px 0}.result-box{background:#fffaf4;border:1px solid var(--border);border-radius:18px;padding:24px;margin:22px 0}.review-list{margin-top:20px;display:grid;gap:12px}.review-item{background:#fffdf9;border:1px solid var(--border);border-radius:14px;padding:14px 16px;font-size:15px}footer{text-align:center;color:var(--muted);padding:12px 20px 34px;font-size:14px}@media(max-width:720px){body{background-attachment:scroll}header h1{font-size:34px}.start-screen,.question-screen,.end-screen{padding:24px}.progress-area{padding:20px 24px 0}.question-text{font-size:21px}.info-grid{grid-template-columns:1fr}}</style>
</head>
<body>
<div class="page-overlay"><header><div class="topline">Reading Corner · 中文</div><h1>Become a Literature Expert</h1><p>郁金香街的谜案 — 文学分析测验</p></header>
<main><section class="quiz-shell">
<div id="startScreen" class="start-screen"><span class="badge">中文 · 文学分析 · 20 道题</span><h2>用真正的文学工具读故事。</h2><p class="lead">这个测验不只是问发生了什么，而是问文本怎样运作：叙述者、聚焦、故事时间、叙述时间、省略、场景、空间、悬念和线索建构。</p><div class="special-note">说明：同故事、异故事等术语描述的是叙述者，不是真实作者。这个测验会保持这种术语精确性。</div><div class="info-grid"><div class="info-card"><strong>20</strong><span>道题</span></div><div class="info-card"><strong>中文</strong><span>故事版</span></div><div class="info-card"><strong>即时</strong><span>反馈</span></div></div><div class="button-row"><button class="primary-action" onclick="startQuiz()">开始文学测验</button><a class="link-button secondary-action" href="index.html">返回主页</a></div></div>
<div id="quizScreen" class="hidden"><div class="progress-area"><div class="progress-top"><span id="questionCounter"></span><span id="scoreCounter"></span></div><div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div></div><div class="question-screen"><div class="badge" id="categoryBadge"></div><h2 id="questionText" class="question-text"></h2><div id="answers" class="answers"></div><div id="feedback" class="feedback"><h3 id="feedbackTitle"></h3><p id="feedbackText"></p></div><div class="button-row"><button id="nextButton" class="primary-action hidden" onclick="nextQuestion()">下一题</button></div></div></div>
<div id="endScreen" class="end-screen hidden"><span class="badge">测验完成</span><h2>你的结果</h2><div id="scoreBig" class="score-big"></div><div class="result-box"><p id="finalMessage" class="lead"></p></div><div class="button-row"><button class="primary-action" onclick="restartQuiz()">再试一次</button><a class="link-button secondary-action" href="index.html">返回主页</a></div><div id="reviewList" class="review-list"></div></div>
</section></main><footer>© 2026 Reading Corner — Stories to go</footer></div>
<script>
const questions = [{"category": "叙述者", "question": "这个故事的叙述者最准确地说是什么类型？", "answers": ["自叙述者，因为贾科莫用第一人称讲自己的故事。", "故事外—异故事叙述者，因为叙述者在故事外讲述，并不是故事中的人物。", "故事内叙述者，因为瓦莱小姐讲述了发现尸体的过程。", "全知叙述者，因为一开始就告诉读者谁是凶手。"], "correct": 1, "explanation": "故事用第三人称叙述，叙述者不是故事中的行动人物。"}, {"category": "作者与叙述者", "question": "下面哪一句最符合文学术语？", "answers": ["作者是异故事的，因为作者不住在郁金香街。", "贾科莫是异故事的，因为别人用第三人称讲他。", "叙述者是异故事的，因为他不是故事世界中的人物。", "西莫娜是故事外人物，因为她帮助调查。"], "correct": 2, "explanation": "异故事、同故事这些术语主要用来描述叙述者，不是描述真实作者或普通人物。"}, {"category": "聚焦", "question": "虽然叙述者不是贾科莫，但很多场景主要通过谁的感知展开？", "answers": ["通过贾科莫的内部聚焦。", "通过完全全知的零聚焦。", "通过纯外部聚焦，没有任何心理描写。", "通过第一人称不可靠叙述。"], "correct": 0, "explanation": "读者经常跟随贾科莫看到、听到、想到和怀疑的内容。"}, {"category": "内心描写", "question": "哪个例子最明显地表现了贾科莫的内心世界？", "answers": ["电梯前写着“停止使用”。", "警察进进出出。", "他想对西莫娜说“你真漂亮”，但最后只说“没有，没什么”。", "故事列出了拼音。"], "correct": 2, "explanation": "这里直接展示了他的内心想法和外在语言之间的差距。"}, {"category": "故事时间", "question": "这一集的故事时间大约覆盖多久？", "answers": ["从星期五晚上到星期六晚上。", "贾科莫的整个童年。", "只包括看见开着的门那几分钟。", "整整一个月的警方调查。"], "correct": 0, "explanation": "情节从星期五晚上开始，到星期六晚上在花园继续。"}, {"category": "叙述时间", "question": "文学分析中，“叙述时间”主要指什么？", "answers": ["侦探小说产生的历史年代。", "文本讲述某些事件所用的篇幅或阅读时间。", "卡西先生死亡的具体时间。", "贾科莫和西莫娜的年龄。"], "correct": 1, "explanation": "叙述时间指文本如何用话语来展开事件，不等于故事中真实经过的时间。"}, {"category": "故事时间与叙述时间", "question": "下面哪种说法最准确？", "answers": ["侦探故事中，故事时间和叙述时间总是完全一样。", "叙述时间从星期五到星期六，而故事时间只有几分钟。", "故事时间大约一天，叙述时间却短得多。", "故事时间就是页数。"], "correct": 2, "explanation": "故事中的事件大约跨越一天，但读者读完它所需的时间通常短得多。"}, {"category": "概述", "question": "哪个句子最像叙事中的“概述”或时间压缩？", "answers": ["贾科莫已经在花园里待了两个小时。", "“你……证人？”", "“没有，没什么。”", "莫雷诺家里的对话。"], "correct": 0, "explanation": "两个小时被压缩成一句话，这是典型的时间压缩。"}, {"category": "场景", "question": "哪一段最接近“场景”写法？", "answers": ["说明贾科莫每周二和周五训练。", "在莫雷诺家，贾科莫说自己差不多算是证人的对话。", "概括瓦莱小姐总是知道所有人的事情。", "一句话总结他在花园等了两个小时。"], "correct": 1, "explanation": "这里有连续对话和动作，叙述时间接近事件发生的时间。"}, {"category": "省略", "question": "哪个地方最接近叙事中的“省略”？", "answers": ["详细描写贾科莫的足球梦。", "从星期五晚上快速跳到星期六早上，没有讲完整个夜晚。", "和马尔蒂诺医生的谈话。", "西莫娜外貌的描写。"], "correct": 1, "explanation": "故事省略了夜晚的大部分时间。"}, {"category": "直接人物塑造", "question": "哪个例子属于对西莫娜的直接人物塑造？", "answers": ["西莫娜握住贾科莫的手。", "西莫娜是高挑、苗条的女孩，有栗色头发和蓝色眼睛。", "西莫娜说莫雷诺先生让她害怕。", "西莫娜按比安奇家的门铃。"], "correct": 1, "explanation": "叙述者直接说明了西莫娜的外貌。"}, {"category": "间接人物塑造", "question": "哪个细节间接表现了贾科莫的害羞？", "answers": ["他十六岁。", "他踢足球。", "他想对西莫娜表白，却只说“没有，没什么”。", "他住在三楼。"], "correct": 2, "explanation": "他的害羞不是直接说明出来，而是通过行为和沉默表现出来。"}, {"category": "空间", "question": "楼梯在故事中有什么叙事功能？", "answers": ["它是经过、观察、听声音和偶遇的空间。", "它只是建筑装饰，没有叙事功能。", "它只是为了表现意大利氛围。", "它替代卡西先生的公寓成为犯罪现场。"], "correct": 0, "explanation": "楼梯让人物经过门口、听见声音、发现线索。"}, {"category": "母题", "question": "贾科莫和西莫娜的调查最明显围绕哪个母题展开？", "answers": ["海边和假期。", "门、门铃、公寓和进入私人空间。", "火车旅行。", "学校和考试成绩。"], "correct": 1, "explanation": "他们的调查就是一户一户按门铃、进入公寓、寻找线索。"}, {"category": "悬念", "question": "卡西先生开着的门为什么制造悬念？", "answers": ["因为它马上揭示了凶手。", "因为它只是现实主义装饰，没有后果。", "因为它是一个不完整的线索，让读者产生疑问。", "因为它证明卡西先生邀请了贾科莫。"], "correct": 2, "explanation": "开着的门不解释一切，只让读者开始猜测。"}, {"category": "伏笔", "question": "哪个细节像是后面线索的伏笔？", "answers": ["电梯停止使用，因为它迫使两个年轻人经过卡西先生家门口。", "晚饭的意大利面，因为它揭示了凶手。", "西莫娜买咖啡，因为它解决了案件。", "瓦莱小姐的狗，因为它代替了警察。"], "correct": 0, "explanation": "电梯坏了看似日常，却为之后看到门口线索创造了条件。"}, {"category": "反讽", "question": "哪个场景有明显的喜剧性反差？", "answers": ["贾科莫梦见体育场喊他的名字，醒来后发现是妈妈在叫他。", "卡西先生被发现死亡。", "警察谈论卡西先生的朋友圈。", "贾科莫躲在花园里。"], "correct": 0, "explanation": "宏大的足球梦被家庭日常突然打断，形成反差。"}, {"category": "对话", "question": "故事中的对话主要有什么功能？", "answers": ["完全取消叙述者的作用。", "提供信息、制造紧张感、塑造人物。", "让情节停下来，没有任何作用。", "只是外语练习。"], "correct": 1, "explanation": "对话推动调查，也展示人物性格和线索。"}, {"category": "体裁", "question": "这个故事最接近哪种体裁结构？", "answers": ["带有青春情感成长元素的侦探故事。", "现实主义战争报道。", "传统神奇童话。", "没有情节的哲学论文。"], "correct": 0, "explanation": "故事有死亡、嫌疑人、线索和调查，也有贾科莫与西莫娜之间的情感成长。"}, {"category": "悬念结尾", "question": "最后在花园里，比安奇太太和莫雷诺先生的场景有什么作用？", "answers": ["彻底结束案件。", "消除对比安奇太太的所有怀疑。", "让嫌疑人之间的关系更复杂，并制造悬念结尾。", "说明警察已经解决案件。"], "correct": 2, "explanation": "这个场景没有解开谜案，而是增加了两个嫌疑人之间的秘密关系。"}];
let currentQuestion=0,score=0,answered=false,userAnswers=[];
const startScreen=document.getElementById("startScreen"),quizScreen=document.getElementById("quizScreen"),endScreen=document.getElementById("endScreen"),questionCounter=document.getElementById("questionCounter"),scoreCounter=document.getElementById("scoreCounter"),progressFill=document.getElementById("progressFill"),categoryBadge=document.getElementById("categoryBadge"),questionText=document.getElementById("questionText"),answersBox=document.getElementById("answers"),feedback=document.getElementById("feedback"),feedbackTitle=document.getElementById("feedbackTitle"),feedbackText=document.getElementById("feedbackText"),nextButton=document.getElementById("nextButton"),scoreBig=document.getElementById("scoreBig"),finalMessage=document.getElementById("finalMessage"),reviewList=document.getElementById("reviewList");
function startQuiz(){startScreen.classList.add("hidden");quizScreen.classList.remove("hidden");showQuestion();}
function showQuestion(){answered=false;const q=questions[currentQuestion];categoryBadge.textContent=q.category;questionCounter.textContent="第 "+(currentQuestion+1)+" 题 / 共 "+questions.length+" 题";scoreCounter.textContent="得分："+score;progressFill.style.width=(currentQuestion/questions.length*100)+"%";questionText.textContent=q.question;answersBox.innerHTML="";feedback.style.display="none";nextButton.classList.add("hidden");q.answers.forEach((answer,index)=>{const btn=document.createElement("button");btn.className="answer-btn";btn.textContent=answer;btn.onclick=()=>chooseAnswer(index,btn);answersBox.appendChild(btn);});}
function chooseAnswer(index,button){if(answered)return;answered=true;const q=questions[currentQuestion],allButtons=document.querySelectorAll(".answer-btn");allButtons.forEach(btn=>btn.disabled=true);const isCorrect=index===q.correct;userAnswers.push({question:q.question,chosen:q.answers[index],correct:q.answers[q.correct],isCorrect:isCorrect});if(isCorrect){score++;button.classList.add("correct");feedbackTitle.textContent="正确！";feedbackText.textContent=q.explanation;}else{button.classList.add("wrong");allButtons[q.correct].classList.add("correct");feedbackTitle.textContent="不完全对。";feedbackText.textContent="正确答案："+q.answers[q.correct]+"。"+q.explanation;}scoreCounter.textContent="得分："+score;feedback.style.display="block";nextButton.textContent=currentQuestion===questions.length-1?"查看结果":"下一题";nextButton.classList.remove("hidden");progressFill.style.width=((currentQuestion+1)/questions.length*100)+"%";}
function nextQuestion(){currentQuestion++;if(currentQuestion<questions.length)showQuestion();else showResult();}
function showResult(){quizScreen.classList.add("hidden");endScreen.classList.remove("hidden");const percentage=Math.round(score/questions.length*100);scoreBig.textContent=score+" / "+questions.length+" ("+percentage+"%)";if(percentage>=90)finalMessage.textContent="非常好。你已经能用真正的叙事学工具分析故事了。";else if(percentage>=70)finalMessage.textContent="很好。你已经能识别许多叙事技巧。";else if(percentage>=50)finalMessage.textContent="不错的开始。建议复习叙述者、聚焦、时间、省略、场景和悬念。";else finalMessage.textContent="可以再试一次。重点看：谁在讲述，谁在感知，时间如何推进，线索如何被建构。";reviewList.innerHTML="";userAnswers.forEach((item,idx)=>{if(!item.isCorrect){const div=document.createElement("div");div.className="review-item";div.innerHTML="<strong>第 "+(idx+1)+" 题：</strong> "+item.question+"<br>你的答案："+item.chosen+"<br>正确答案："+item.correct;reviewList.appendChild(div);}});if(reviewList.innerHTML===""){const div=document.createElement("div");div.className="review-item";div.innerHTML="<strong>完美！</strong>所有问题都答对了。";reviewList.appendChild(div);}}
function restartQuiz(){currentQuestion=0;score=0;answered=false;userAnswers=[];endScreen.classList.add("hidden");startScreen.classList.remove("hidden");progressFill.style.width="0%";}
</script>
</body>
</html>
